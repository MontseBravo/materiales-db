<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaterialsAI</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080A0F;--bg2:#0E1118;--surface:#13161F;--surface2:#1A1E2A;
  --border:#252A38;--border2:#2F3547;
  --accent:#00FFB2;--accent2:#7B6FFF;--accent3:#FF6B35;
  --text:#E8EBF4;--muted:#5A6080;--muted2:#8890AA;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:48px 48px;opacity:0.3;pointer-events:none;z-index:0}

/* Header */
header{position:sticky;top:0;z-index:100;background:rgba(8,10,15,0.9);
  backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:30px;height:30px;background:var(--accent);border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:15px;
  box-shadow:0 0 18px rgba(0,255,178,0.35)}
.logo-text{font-family:'Space Mono',monospace;font-size:.95rem;font-weight:700}
.logo-text span{color:var(--accent)}
.hstats{display:flex;gap:1.5rem;font-family:'Space Mono',monospace;font-size:.68rem;color:var(--muted)}
.hstats b{color:var(--accent2)}

/* Tabs */
.tabs{position:relative;z-index:10;display:flex;border-bottom:1px solid var(--border);background:var(--bg2)}
.tab{flex:1;padding:1rem 2rem;border:none;background:transparent;color:var(--muted2);
  cursor:pointer;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:600;
  border-bottom:2px solid transparent;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:10px}
.tab:hover{color:var(--text);background:rgba(255,255,255,0.02)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .num{font-family:'Space Mono',monospace;font-size:.62rem;
  background:var(--surface2);padding:2px 7px;border-radius:20px}
.tab.active .num{background:rgba(0,255,178,.1);color:var(--accent)}

/* Main */
main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:2rem}
.panel{display:none}.panel.active{display:block}

/* Search */
.search-row{display:flex;gap:10px;margin-bottom:1.5rem;position:relative}
.sw{flex:1;position:relative}
.sw input{width:100%;background:var(--surface);border:1px solid var(--border2);
  color:var(--text);padding:14px 16px 14px 44px;
  font-family:'Syne',sans-serif;font-size:1rem;border-radius:8px;outline:none;
  transition:border-color .2s,box-shadow .2s}
.sw input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,255,178,.08)}
.sw .ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1.1rem}
.sbtn{background:var(--accent);color:#000;border:none;padding:0 24px;border-radius:8px;
  cursor:pointer;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;
  transition:all .2s;white-space:nowrap}
.sbtn:hover{opacity:.85;transform:translateY(-1px)}

/* Autocomplete */
.ac{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface2);
  border:1px solid var(--border2);border-radius:8px;overflow:hidden;
  max-height:260px;overflow-y:auto;z-index:200;
  box-shadow:0 8px 32px rgba(0,0,0,.5);display:none}
.ac-item{padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border);
  transition:background .15s;font-size:.88rem}
.ac-item:hover,.ac-item.sel{background:var(--border2)}
.ac-sub{font-family:'Space Mono',monospace;font-size:.66rem;color:var(--muted);margin-top:2px}
.hl{color:var(--accent)}

/* Material card */
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  margin-bottom:1rem;overflow:hidden;animation:fu .3s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.mcard-head{padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.mname{font-family:'Space Mono',monospace;color:var(--accent);font-size:.95rem}
.bdg{font-family:'Space Mono',monospace;font-size:.62rem;padding:3px 9px;border-radius:20px}
.bdg-s{background:rgba(0,255,178,.08);color:var(--accent);border:1px solid rgba(0,255,178,.2)}
.bdg-h{background:rgba(123,111,255,.1);color:var(--accent2);border:1px solid rgba(123,111,255,.2)}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:1px;background:var(--border)}
.prop{background:var(--bg2);padding:14px 10px;text-align:center}
.plbl{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:5px}
.pval{font-size:1.2rem;font-weight:700;color:var(--text)}
.punit{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--muted);display:block;margin-top:2px}

/* Finder */
.fgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.5rem}
@media(max-width:600px){.fgrid{grid-template-columns:1fr}}
.fcard{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:14px;transition:border-color .2s}
.fcard.on{border-color:var(--accent2)}
.ftop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.flbl{font-family:'Space Mono',monospace;font-size:.66rem;color:var(--muted2);
  text-transform:uppercase;letter-spacing:.07em}
.toggle{position:relative;width:36px;height:20px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.trk{position:absolute;inset:0;background:var(--border2);border-radius:20px;transition:background .2s}
.toggle input:checked+.trk{background:var(--accent2)}
.thmb{position:absolute;top:3px;left:3px;width:14px;height:14px;
  background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked~.thmb{transform:translateX(16px)}
.rrow{display:flex;align-items:center;gap:8px}
.rrow input{flex:1;min-width:0;background:var(--bg2);border:1px solid var(--border2);
  color:var(--text);padding:7px 10px;font-family:'Space Mono',monospace;
  font-size:.78rem;border-radius:5px;outline:none;transition:border-color .2s}
.rrow input:focus{border-color:var(--accent)}
.rsep{color:var(--muted);font-size:.75rem;flex-shrink:0}
.fbtn{width:100%;background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#000;border:none;padding:14px;border-radius:8px;cursor:pointer;
  font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;
  transition:all .2s;margin-bottom:1.5rem;letter-spacing:.02em}
.fbtn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,255,178,.2)}

/* Match cards */
.mxcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  margin-bottom:10px;overflow:hidden;animation:fu .3s ease;position:relative}
.mxcard.top{border-color:var(--accent);box-shadow:0 0 20px rgba(0,255,178,.07)}
.rnk{position:absolute;top:12px;right:14px;font-family:'Space Mono',monospace;
  font-size:.65rem;color:var(--muted)}
.mxcard.top .rnk{color:var(--accent)}
.mxhead{padding:12px 16px;border-bottom:1px solid var(--border)}
.mxname{font-family:'Space Mono',monospace;color:var(--accent2);font-size:.88rem;margin-bottom:4px}
.mxmeta{font-family:'Space Mono',monospace;font-size:.66rem;color:var(--muted)}
.mxmeta .sc{color:var(--accent);font-weight:700}
.mxprops{padding:10px 16px;display:flex;flex-wrap:wrap;gap:14px}
.mp .ml{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--muted);display:block;margin-bottom:2px}
.mp{font-size:.78rem}

.slbl{font-family:'Space Mono',monospace;font-size:.64rem;text-transform:uppercase;
  letter-spacing:.12em;color:var(--muted);margin-bottom:12px}
.empty{text-align:center;padding:3rem;font-family:'Space Mono',monospace;font-size:.8rem;color:var(--muted)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">⬡</div>
    <div class="logo-text">Materials<span>AI</span></div>
  </div>
  <div class="hstats">
    <span>Registros <b id="s1">—</b></span>
    <span>Materiales <b id="s2">—</b></span>
    <span>Normas <b id="s3">—</b></span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('search')">
    <span class="num">01</span> Buscar material
  </button>
  <button class="tab" onclick="switchTab('finder')">
    <span class="num">02</span> Encontrar materiales
  </button>
</div>

<main>
  <!-- Panel 1 -->
  <div class="panel active" id="panel-search">
    <div class="search-row">
      <div class="sw">
        <span class="ico">⌕</span>
        <input id="sinput" type="text" placeholder="Escribe el nombre del material… ej: Steel SAE 1040"
          oninput="onIn(this.value)" onkeydown="onKey(event)" autocomplete="off">
        <div class="ac" id="acbox"></div>
      </div>
      <button class="sbtn" onclick="doSearch()">Buscar →</button>
    </div>
    <div id="sout"></div>
  </div>

  <!-- Panel 2 -->
  <div class="panel" id="panel-finder">
    <p class="slbl">Activa los filtros y ajusta los rangos</p>
    <div class="fgrid" id="fgrid"></div>
    <button class="fbtn" onclick="doFind()">🎯 Buscar materiales óptimos</button>
    <div id="fout"></div>
  </div>
</main>

let acItems=[],acIdx=-1;

function onIn(v){
  acIdx=-1;
  if(v.length<2){closeAC();return;}
  const lv=v.toLowerCase();
  acItems=DB.materials.filter(m=>m.toLowerCase().includes(lv)).slice(0,18);
  renderAC(v);
}
function renderAC(q){
  const box=document.getElementById('acbox');
  if(!acItems.length){closeAC();return;}
  const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  box.innerHTML=acItems.map((m,i)=>{
    const cnt=DB.records.filter(r=>r.Material===m).length;
    return`<div class="ac-item" onmousedown="pickAC('${m.replace(/'/g,"\'")}');return false">
      ${m.replace(re,s=>`<span class="hl">${s}</span>`)}
      <div class="ac-sub">${cnt} variante${cnt!==1?'s':''}</div>
    </div>`;
  }).join('');
  box.style.display='block';
}
function closeAC(){document.getElementById('acbox').style.display='none';}
function pickAC(name){document.getElementById('sinput').value=name;closeAC();showMat(name);}
function onKey(e){
  const items=document.querySelectorAll('.ac-item');
  if(e.key==='ArrowDown'){acIdx=Math.min(acIdx+1,items.length-1);items.forEach((it,i)=>it.classList.toggle('sel',i===acIdx));}
  else if(e.key==='ArrowUp'){acIdx=Math.max(acIdx-1,0);items.forEach((it,i)=>it.classList.toggle('sel',i===acIdx));}
  else if(e.key==='Enter'){if(acIdx>=0&&acItems[acIdx])pickAC(acItems[acIdx]);else doSearch();}
  else if(e.key==='Escape')closeAC();
}
function doSearch(){
  const v=document.getElementById('sinput').value.trim();
  if(!v)return;
  let recs=DB.records.filter(r=>r.Material.toLowerCase()===v.toLowerCase());
  if(!recs.length)recs=DB.records.filter(r=>r.Material.toLowerCase().includes(v.toLowerCase()));
  closeAC();
  if(!recs.length){document.getElementById('sout').innerHTML=`<p class="empty">No se encontró "<b>${v}</b>"</p>`;return;}
  renderMats(recs);
}
document.addEventListener('click',e=>{if(!e.target.closest('.sw'))closeAC();});

const PROPS=[
  ['Ultimate_Strength_MPa','Resist. última','MPa'],
  ['Yield_Strength_MPa','Lím. fluencia','MPa'],
  ['Elongation_pct','Elongación','%'],
  ['Hardness_Bhn','Dureza','Bhn'],
  ['Elastic_Modulus_MPa','Mód. elástico','MPa'],
  ['Shear_Modulus_MPa','Mód. corte','MPa'],
  ['Poisson_Ratio','Poisson',''],
  ['Density_kg_m3','Densidad','kg/m³'],
];

function renderMats(recs){
  document.getElementById('sout').innerHTML=recs.map(r=>{
    const grid=PROPS.map(([k,l,u])=>{
      const v=r[k];
      const d=(v===null||v===undefined)?'—':(typeof v==='number'?v.toLocaleString():v);
      return`<div class="prop"><span class="plbl">${l}</span><span class="pval">${d}</span><span class="punit">${u}</span></div>`;
    }).join('');
    return`<div class="mcard">
      <div class="mcard-head">
        <span class="mname">${r.Material}</span>
        <div style="display:flex;gap:6px">
          <span class="bdg bdg-s">${r.Standard}</span>
          <span class="bdg bdg-h">${r.Heat_Treatment}</span>
        </div>
      </div>
      <div class="pgrid">${grid}</div>
    </div>`;
  }).join('');
}

// ── Finder ─────────────────────────────────────────────────────────────────
const FILTERS=[
  {col:'Ultimate_Strength_MPa',label:'Resist. última (MPa)',   mn:69,   mx:2220, step:1},
  {col:'Yield_Strength_MPa',   label:'Lím. fluencia (MPa)',    mn:28,   mx:2048, step:1},
  {col:'Elongation_pct',       label:'Elongación (%)',          mn:0.5,  mx:70,   step:0.5},
  {col:'Hardness_Bhn',         label:'Dureza (Bhn)',            mn:19,   mx:627,  step:1},
  {col:'Elastic_Modulus_MPa',  label:'Mód. elástico (MPa)',    mn:73000,mx:219000,step:1000},
  {col:'Shear_Modulus_MPa',    label:'Mód. corte (MPa)',       mn:26000,mx:769000,step:1000},
  {col:'Poisson_Ratio',        label:'Relación de Poisson',    mn:0.20, mx:0.35, step:0.01},
  {col:'Density_kg_m3',        label:'Densidad (kg/m³)',       mn:1750, mx:8930, step:10},
];

FILTERS.forEach((f,i)=>{
  document.getElementById('fgrid').innerHTML+=`
  <div class="fcard" id="fc${i}">
    <div class="ftop">
      <span class="flbl">${f.label}</span>
      <label class="toggle">
        <input type="checkbox" id="chk${i}" onchange="tog(${i})">
        <div class="trk"></div><div class="thmb"></div>
      </label>
    </div>
    <div class="rrow" id="fr${i}" style="opacity:.35;pointer-events:none">
      <input type="number" id="mn${i}" value="${f.mn}" step="${f.step}">
      <span class="rsep">—</span>
      <input type="number" id="mx${i}" value="${f.mx}" step="${f.step}">
    </div>
  </div>`;
});

function tog(i){
  const on=document.getElementById('chk'+i).checked;
  document.getElementById('fr'+i).style.cssText=on?'':'opacity:.35;pointer-events:none';
  document.getElementById('fc'+i).classList.toggle('on',on);
}

function doFind(){
  const active={};
  FILTERS.forEach((f,i)=>{
    if(document.getElementById('chk'+i).checked)
      active[f.col]=[+document.getElementById('mn'+i).value,+document.getElementById('mx'+i).value];
  });
  if(!Object.keys(active).length){
    document.getElementById('fout').innerHTML='<p class="empty">Activa al menos un filtro.</p>';return;
  }
  const scored=DB.records.map(r=>{
    let s=0,n=0;
    for(const[col,[lo,hi]]of Object.entries(active)){
      const v=r[col];if(v===null||v===undefined){n++;continue;}
      const rng=hi-lo||1;
      s+=(v>=lo&&v<=hi)?1:Math.max(0,1-Math.max(0,lo-v,v-hi)/rng);n++;
    }
    return{r,score:n?s/n:0};
  });
  scored.sort((a,b)=>b.score-a.score);
  const top=scored.slice(0,10);
  document.getElementById('fout').innerHTML=
    `<p class="slbl">Top ${top.length} materiales más compatibles</p>`+
    top.map(({r,score},i)=>`
    <div class="mxcard ${i===0?'top':''}">
      <span class="rnk">#${i+1}</span>
      <div class="mxhead">
        <div class="mxname">${r.Material}</div>
        <div class="mxmeta">
          Compatibilidad: <span class="sc">${Math.round(score*100)}%</span>
          &nbsp;·&nbsp;${r.Standard}&nbsp;·&nbsp;${r.Heat_Treatment}
        </div>
      </div>
      <div class="mxprops">
        ${r.Ultimate_Strength_MPa!=null?`<div class="mp"><span class="ml">UTS</span>${r.Ultimate_Strength_MPa} MPa</div>`:''}
        ${r.Yield_Strength_MPa!=null?`<div class="mp"><span class="ml">Fluencia</span>${r.Yield_Strength_MPa} MPa</div>`:''}
        ${r.Elongation_pct!=null?`<div class="mp"><span class="ml">Elongación</span>${r.Elongation_pct}%</div>`:''}
        ${r.Hardness_Bhn!=null?`<div class="mp"><span class="ml">Dureza</span>${r.Hardness_Bhn} Bhn</div>`:''}
        ${r.Elastic_Modulus_MPa!=null?`<div class="mp"><span class="ml">Mód. E</span>${r.Elastic_Modulus_MPa.toLocaleString()} MPa</div>`:''}
        ${r.Density_kg_m3!=null?`<div class="mp"><span class="ml">Densidad</span>${r.Density_kg_m3} kg/m³</div>`:''}
      </div>
    </div>`).join('');
}
</script>
